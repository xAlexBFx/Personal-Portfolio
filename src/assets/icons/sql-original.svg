<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="sqlGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00758F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A70;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Database cylinder - maximum size -->
  <ellipse cx="50" cy="8" rx="45" ry="15" fill="url(#sqlGradient)" />
  <rect x="5" y="8" width="90" height="70" fill="url(#sqlGradient)" />
  <ellipse cx="50" cy="78" rx="45" ry="15" fill="url(#sqlGradient)" />
  <ellipse cx="50" cy="8" rx="45" ry="15" fill="#0088AA" opacity="0.3" />
  
  <!-- SQL text - maximum size -->
  <text x="50" y="45" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle">SQL</text>
</svg>
